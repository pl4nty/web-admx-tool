version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-dependencies:
        applies-to: version-updates
        patterns:
        - "*"
    commit-message:
      prefix: "actions"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
        - "*"
    commit-message:
      prefix: "npm"
    ignore:
      # For all deps
      - dependency-name: "*"
        # ignore all major updates
        update-types: ["version-update:semver-major"]
